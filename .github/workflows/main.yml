name: Sync Elasticsearch Image
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull image from Elastic
        run: docker pull docker.elastic.co/elasticsearch/elasticsearch:9.4.2
        
      # 登录 Docker Hub（使用变量+密钥）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Tag and Push
        run: |
          docker tag docker.elastic.co/elasticsearch/elasticsearch:9.4.2 lyukun/elasticsearch:9.4.2
          docker push lyukun/elasticsearch:9.4.2
